# Docker Compose for Tipalti Invoice API Playground
# Orchestrates backend (.NET) and frontend (Angular/Nginx)

version: '3.8'

services:
  # CleanApi: .NET 8 Clean Architecture API
  cleanapi:
    build:
      context: ./CleanApi
      dockerfile: Dockerfile
    container_name: tipalti-cleanapi
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - tipalti-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend: Angular 18 with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tipalti-frontend
    ports:
      - "4200:80"
    depends_on:
      - cleanapi
    networks:
      - tipalti-network
    environment:
      - API_URL=http://backend:8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  tipalti-network:
    driver: bridge

# Usage:
# docker-compose up --build              # Build and start all services
# docker-compose up --build cleanapi     # Build and start only CleanApi
# docker-compose down                    # Stop and remove containers
# docker-compose logs -f                 # Follow logs from all services
